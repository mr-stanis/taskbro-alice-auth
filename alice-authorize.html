<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskBro x Alice</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      max-width: 520px;
      margin: 32px auto;
      padding: 0 16px;
      color: #111827;
    }
    h2 {
      margin: 0 0 12px 0;
    }
    .muted {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }
    .err {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>Привязка аккаунта TaskBro</h2>
  <p class="muted">Введите одноразовый код из приложения TaskBro.</p>

  <form id="form" method="post" action="https://yjeiwfpoutiinoszwpcs.supabase.co/functions/v1/taskbro-oauth/oauth/authorize">
    <input type="hidden" id="client_id" name="client_id" />
    <input type="hidden" id="redirect_uri" name="redirect_uri" />
    <input type="hidden" id="state" name="state" />
    <input type="hidden" id="scope" name="scope" />
    <input type="hidden" id="response_type" name="response_type" />
    <label for="code">Код привязки</label>
    <input id="code" name="code" maxlength="16" autocomplete="one-time-code" required />
    <button type="submit">Связать аккаунт</button>
  </form>

  <div id="error" class="err"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("client_id").value = params.get("client_id") || "";
    document.getElementById("redirect_uri").value = params.get("redirect_uri") || "";
    document.getElementById("state").value = params.get("state") || "";
    document.getElementById("scope").value = params.get("scope") || "";
    document.getElementById("response_type").value = params.get("response_type") || "code";

    document.getElementById("form").addEventListener("submit", (event) => {
      const errorNode = document.getElementById("error");
      errorNode.textContent = "";
      const codeInput = document.getElementById("code");
      const normalized = (codeInput.value || "").trim().toUpperCase();
      if (!normalized) {
        event.preventDefault();
        errorNode.textContent = "Введите код привязки.";
        return;
      }
      codeInput.value = normalized;
    });
  </script>
</body>
</html>
