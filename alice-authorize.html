<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskBro x Alice</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      max-width: 520px;
      margin: 32px auto;
      padding: 0 16px;
      color: #111827;
    }
    h2 {
      margin: 0 0 12px 0;
    }
    .muted {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }
    .err {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>Привязка аккаунта TaskBro</h2>
  <p class="muted">Введите одноразовый код из приложения TaskBro.</p>

  <form id="form">
    <label for="code">Код привязки</label>
    <input id="code" maxlength="16" autocomplete="one-time-code" required />
    <button type="submit">Связать аккаунт</button>
  </form>

  <div id="error" class="err"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const oauthPostURL = "https://yjeiwfpoutiinoszwpcs.supabase.co/functions/v1/taskbro-oauth/oauth/authorize";

    document.getElementById("form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const errorNode = document.getElementById("error");
      errorNode.textContent = "";

      const code = (document.getElementById("code").value || "").trim().toUpperCase();
      if (!code) {
        errorNode.textContent = "Введите код привязки.";
        return;
      }

      const body = new URLSearchParams();
      body.set("code", code);
      body.set("client_id", params.get("client_id") || "");
      body.set("redirect_uri", params.get("redirect_uri") || "");
      body.set("state", params.get("state") || "");
      body.set("scope", params.get("scope") || "");
      body.set("response_type", params.get("response_type") || "code");

      try {
        const response = await fetch(oauthPostURL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: body.toString(),
          redirect: "manual"
        });

        const redirectLocation = response.headers.get("location");
        if (redirectLocation) {
          window.location.href = redirectLocation;
          return;
        }

        errorNode.textContent = "Не удалось привязать аккаунт. Проверьте код и попробуйте снова.";
      } catch {
        errorNode.textContent = "Сетевая ошибка. Попробуйте ещё раз.";
      }
    });
  </script>
</body>
</html>
